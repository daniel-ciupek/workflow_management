services:
  app:
    image: danielciupek/workflow-management:1.1.0
    container_name: workflow_app
    restart: unless-stopped
    volumes:
      - .:/var/www/html
      - /var/www/html/vendor
      - /var/www/html/node_modules
    environment:
      - APP_ENV=${APP_ENV:-local}
    depends_on:
      postgres:
        condition: service_healthy

  nginx:
    image: nginx:1.27-alpine
    container_name: workflow_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "8000:8000"
    volumes:
      - .:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app

  postgres:
    image: postgres:16.2
    container_name: workflow_postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${DB_DATABASE:-workflow_management}
      POSTGRES_USER: ${DB_USERNAME:-workflow_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-workflow_user} -d ${DB_DATABASE:-workflow_management}"]
      interval: 5s
      timeout: 5s
      retries: 5

  scheduler:
    image: danielciupek/workflow-management:1.1.0
    container_name: workflow_scheduler
    restart: unless-stopped
    volumes:
      - .:/var/www/html
      - /var/www/html/vendor
      - /var/www/html/node_modules
    environment:
      - APP_ENV=${APP_ENV:-local}
    depends_on:
      postgres:
        condition: service_healthy
    command: php artisan schedule:work

  node:
    image: node:22-alpine
    container_name: workflow_node
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
    ports:
      - "5173:5173"
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    depends_on:
      - app

volumes:
  postgres_data:
    driver: local
